mlcore:
  base_url: "http://127.0.0.1:8000"
  timeout_seconds: 30
  health_check_timeout: 3
  health_check_ttl_seconds: 30
  demo_fallback: true

demo:
  default_candidate: "a"
  show_raw_plot: true
  show_cleaned_plot: true
  show_periodogram: true
  show_phase_folded: true
  autorun_on_selection: true
  candidates:
    a:
      label: "exoplanet_transit"
      emoji: "🪐"
      description: "A shallow 1.3% periodic dip every 3.42 days — consistent with a Jupiter-sized planet"
    b:
      label: "eclipsing_binary"
      emoji: "⭐"
      description: "A deep 18% V-shaped eclipse every 1.87 days — characteristic of an eclipsing stellar binary"
    c:
      label: "stellar_variability_or_other"
      emoji: "📊"
      description: "No periodic signal — correlated red noise simulating stellar variability"

ui:
  theme: "dark"
  primary_color: "#534AB7"
  confidence_colors:
    exoplanet_transit: "#3C3489"
    eclipsing_binary: "#712B13"
    blend_contamination: "#D48B00"
    stellar_variability_or_other: "#444441"
  plot_height: 300
  result_card_border_radius: 8
  sidebar_width: 240

export:
  html_enabled: true
  csv_enabled: true
  pdf_enabled: true
  output_dir: "exports/"
  include_plots: true
  filename_template: "transitlens_{type}_{target_id}_{timestamp}"

platform:
  version: "0.1.0"
  repo_url: "https://github.com/transitlens/transitlens-platform"
  hackathon: "Bharatiya Antariksh Hackathon 2026"
  problem_statement: "PS7"
